# Training Configuration
training:
  epochs: 50
  device: cuda
  seed: 42

optimizer:
  name: AdamW
  lr: 0.001
  weight_decay: 0.0005
  betas: [0.9, 0.999]

scheduler:
  name: CosineAnnealingLR
  T_max: 50
  eta_min: 0.00001

loss:
  label_weight: 1.0
  bbox_weight: 1.0

checkpoint:
  save_dir: output/checkpoints
  save_best: true
  save_every: 5                  # Save checkpoint every N epochs
  best_model: output/checkpoints/best.pth
  last_model: output/checkpoints/last.pth

logging:
  log_dir: output/logs
  log_every: 50                  # Log every N iterations
  plots_dir: output/plots
